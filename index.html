<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #f4f7f6;
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 0.5rem;
        }
        .file-list {
            list-style: none;
            padding: 0;
        }
        .file-item {
            background: #fff;
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        .file-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .file-name {
            font-weight: 600;
            color: #3498db;
            text-decoration: none;
            font-size: 1.1rem;
        }
        .file-name:hover {
            text-decoration: underline;
        }
        .install-box {
            background: #2d3436;
            color: #dfe6e9;
            padding: 0.75rem;
            border-radius: 4px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            overflow-x: auto;
        }
        .install-cmd {
            white-space: nowrap;
            margin-right: 1rem;
        }
        .copy-btn {
            background: #636e72;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .copy-btn:hover {
            background: #b2bec3;
        }
        .copy-btn.success {
            background: #27ae60;
        }
        .icon {
            margin-right: 5px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <h1>Files</h1>
    <ul class="file-list">
        <li class="file-item">
            <div class="file-info">
                <a class="file-name" href="fq/fq.sh">fq.sh</a>
            </div>
            <div class="install-box">
                <code class="install-cmd" id="fq-cmd">curl -fsSL <span class="origin"></span>/fq/fq.sh | bash</code>
                <button class="copy-btn" onclick="copyCmd('fq-cmd', this)">
                    <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    Copy
                </button>
            </div>
        </li>
        <li class="file-item">
            <div class="file-info">
                <a class="file-name" href="fq/sing-box-mac-client.json">sing-box-mac-client.json</a>
            </div>
        </li>
    </ul>

    <script>
        document.querySelectorAll('.origin').forEach(el => {
            // 如果是 file:// 协议，则 origin 为空字符串，此时 curl 命令会显示为相对路径，虽然不可执行但链接是对的
            // 如果是 http/https，origin 会包含协议和域名
            const origin = window.location.origin === 'null' ? '' : window.location.origin;
            el.textContent = origin;
        });

        function copyCmd(id, btn) {
            const cmd = document.getElementById(id).textContent;
            navigator.clipboard.writeText(cmd).then(() => {
                const originalContent = btn.innerHTML;
                btn.classList.add('success');
                btn.innerHTML = 'Copied!';
                setTimeout(() => {
                    btn.classList.remove('success');
                    btn.innerHTML = originalContent;
                }, 2000);
            });
        }
    </script>
</body>
</html>
